<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dimensionspro • Outils Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
        .glass { background: rgba(255, 255, 255, 0.97); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    
    <!-- HOME SCREEN -->
    <div id="home-screen" class="min-h-screen bg-zinc-950 flex items-center justify-center relative overflow-hidden">
        <div class="relative z-10 text-center max-w-lg mx-auto px-6">
            
            <!-- Logo -->
            <div class="flex justify-center mb-8">
                <div class="relative">
                    <div class="w-28 h-28 bg-gradient-to-br from-orange-500 to-orange-600 rounded-3xl p-4 shadow-2xl shadow-orange-500/30">
                        <div class="w-full h-full flex items-center justify-center text-white text-4xl font-bold">DP</div>
                    </div>
                    <div class="absolute -bottom-2 -right-2 bg-black text-orange-400 text-xs font-bold px-3 py-1 rounded-full border border-orange-500">PRO</div>
                </div>
            </div>
            
            <h1 class="title-font text-7xl font-bold tracking-tighter mb-4">
                <span class="text-white">DIMENSIONS</span><br>
                <span class="bg-gradient-to-r from-orange-400 to-orange-600 bg-clip-text text-transparent">PRO</span>
            </h1>
            
            <p class="text-2xl text-zinc-400 mb-4">Architecture & Ingénierie</p>
            <p class="text-sm text-zinc-500 mb-12">Outils professionnels • Synchronisation équipe</p>
            
            <!-- Main CTA -->
            <div class="mb-8">
                <button onclick="showCreateProfileModal()" 
                        class="group w-full py-5 bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white font-bold rounded-3xl text-xl flex items-center justify-center gap-x-4 shadow-xl shadow-orange-500/30 transition-all active:scale-[0.985]">
                    <i class="fa-solid fa-user-plus text-2xl group-active:rotate-12 transition-transform"></i>
                    <span>Créer mon profil</span>
                </button>
            </div>
            
            <!-- Existing profiles -->
            <div id="profiles-list" class="text-left mb-4"></div>
            
            <!-- Bouton Rafraîchir Google Sheets -->
            <button onclick="forceSyncNow()" 
                    class="mt-4 w-full py-3 text-sm bg-zinc-700 hover:bg-orange-600 text-white rounded-2xl flex items-center justify-center gap-x-2 font-semibold shadow-lg">
                <i class="fa-solid fa-sync"></i> 
                <span>Rafraîchir (Google Sheets)</span>
            </button>
            <p class="text-[10px] text-zinc-500 mt-1 text-center">Clique ici pour voir les profils de toute l'équipe</p>
            <p class="text-[9px] text-emerald-400 mt-1 text-center">✓ Synchro Google Sheets activée</p>
            
        </div>
        
        <div class="absolute bottom-8 text-center text-sm font-bold tracking-[4px] text-orange-500">
            DIMENSIONS MAROC
        </div>
    </div>

    <!-- CREATE PROFILE MODAL -->
    <div id="create-profile-modal" class="fixed inset-0 bg-black/90 z-[99999] hidden items-center justify-center">
        <div class="glass rounded-3xl p-10 w-full max-w-md border border-zinc-700">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-orange-500 rounded-2xl mx-auto mb-4 flex items-center justify-center">
                    <i class="fa-solid fa-user text-white text-3xl"></i>
                </div>
                <h2 class="text-3xl font-bold">Créer un profil</h2>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="text-sm text-zinc-400">Nom complet</label>
                    <input id="profile-name-input" type="text" placeholder="Ahmed BNI CHIKER" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3 text-lg">
                </div>
            </div>
            <div class="flex gap-x-4 mt-8">
                <button onclick="hideCreateProfileModal()" class="flex-1 py-4 bg-zinc-700 hover:bg-zinc-600 text-white font-semibold rounded-2xl text-lg">Retour</button>
                <button onclick="createProfile()" class="flex-1 py-4 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-2xl text-lg">Créer mon profil</button>
            </div>
        </div>
    </div>

    <script>
        // Google Sheets Configuration
        const SHEET_ID = '10Y9WFRJd7Qym_rc8O2jcfdePYtoOYCSzzmBBKZeTuPI';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

        // Load profiles from Google Sheets
        async function loadProfilesFromGoogleSheets() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                
                // Parse CSV (simple parser)
                const lines = csvText.trim().split('\n');
                const profiles = [];
                
                for (let i = 1; i < lines.length; i++) { // Skip header
                    const values = lines[i].split(',');
                    if (values.length >= 2) {
                        profiles.push({
                            id: values[0].replace(/"/g, ''),
                            name: values[1].replace(/"/g, ''),
                            created: values[2] ? values[2].replace(/"/g, '') : new Date().toISOString()
                        });
                    }
                }
                
                localStorage.setItem('dimensionspro_profiles', JSON.stringify(profiles));
                return profiles;
            } catch (error) {
                console.error('Erreur Google Sheets:', error);
                // Fallback to localStorage
                return JSON.parse(localStorage.getItem('dimensionspro_profiles') || '[]');
            }
        }

        // Save profile to localStorage (for now - full write needs Apps Script)
        function saveProfileToLocal(profile) {
            let profiles = JSON.parse(localStorage.getItem('dimensionspro_profiles') || '[]');
            if (!Array.isArray(profiles)) profiles = [];
            profiles.push(profile);
            localStorage.setItem('dimensionspro_profiles', JSON.stringify(profiles));
        }

        function showCreateProfileModal() {
            document.getElementById('create-profile-modal').classList.remove('hidden');
            document.getElementById('create-profile-modal').classList.add('flex');
        }

        function hideCreateProfileModal() {
            document.getElementById('create-profile-modal').classList.remove('flex');
            document.getElementById('create-profile-modal').classList.add('hidden');
        }

        function createProfile() {
            const name = document.getElementById('profile-name-input').value.trim();
            if (!name) {
                alert("Veuillez entrer un nom");
                return;
            }

            const profile = {
                id: 'profile_' + Date.now(),
                name: name,
                created: new Date().toISOString()
            };

            saveProfileToLocal(profile);
            
            // TODO: Pour l'écriture complète, ajouter Google Apps Script
            alert("Profil créé localement !\nPour la synchro complète avec l'équipe, ajoutez-le manuellement dans la Google Sheet ou contactez-moi pour l'Apps Script.");

            hideCreateProfileModal();
            loadProfilesList();
        }

        async function loadProfilesList() {
            const container = document.getElementById('profiles-list');
            let profiles = await loadProfilesFromGoogleSheets();
            
            if (profiles.length === 0) {
                container.innerHTML = '<p class="text-zinc-400 text-sm">Aucun profil créé</p>';
                return;
            }

            container.innerHTML = '<p class="text-sm text-zinc-400 mb-3">Ou sélectionnez un profil :</p>';
            
            profiles.forEach(profile => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between bg-zinc-800 hover:bg-zinc-700 rounded-2xl px-4 py-3 mb-2 cursor-pointer';
                div.innerHTML = `
                    <div class="flex items-center gap-x-3">
                        <div class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center text-white font-bold">${profile.name.charAt(0)}</div>
                        <div>
                            <div class="font-semibold">${profile.name}</div>
                        </div>
                    </div>
                    <button onclick="selectProfile('${profile.id}'); event.stopImmediatePropagation();" class="px-4 py-1 bg-orange-500 text-white text-sm rounded-xl">Ouvrir</button>
                `;
                div.onclick = () => selectProfile(profile.id);
                container.appendChild(div);
            });
        }

        async function forceSyncNow() {
            const container = document.getElementById('profiles-list');
            container.innerHTML = '<p class="text-zinc-400 text-sm text-center py-4">Synchronisation Google Sheets...</p>';
            
            await loadProfilesList();
            
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-5 py-2 rounded-2xl text-sm';
            toast.innerHTML = `✅ Profils synchronisés depuis Google Sheets !`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function selectProfile(profileId) {
            // Simple profile selection
            alert(`Profil sélectionné : ${profileId}\n\nL'application est maintenant en mode équipe avec Google Sheets !`);
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        }

        // Initialize
        window.onload = async function() {
            await loadProfilesList();
            
            // Auto-refresh every 30 seconds
            setInterval(async () => {
                await loadProfilesList();
            }, 30000);
        }
    </script>
</body>
</html>
